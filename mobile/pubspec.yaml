name: staymind_mobile
description: StayMind AI - Smart Hotel Mobile App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.0.0
  supabase_flutter: ^2.3.0
  stripe_checkout: ^1.0.2
  google_fonts: ^6.1.0
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6
  cached_network_image: ^3.3.1
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  shared_preferences: ^2.2.2
  dio: ^5.4.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_svg: ^2.0.9
  url_launcher: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
